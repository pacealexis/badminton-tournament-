<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Heart Lake Badminton Tournament</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      background: #f4f6f8;
    }
    header {
      background: #163a70;
      color: white;
      padding: 20px;
      text-align: center;
      font-size: 28px;
      font-weight: bold;
    }
    .tabs {
      display: flex;
      justify-content: center;
      flex-wrap: wrap;
      background: white;
      border-bottom: 1px solid #ddd;
    }
    .tab {
      padding: 12px 18px;
      cursor: pointer;
      font-weight: bold;
    }
    .tab.active {
      color: #163a70;
      border-bottom: 3px solid #163a70;
    }
    .section {
      padding: 20px;
    }
    .courts {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 16px;
    }
    .card {
      background: white;
      border-radius: 12px;
      padding: 16px;
      box-shadow: 0 3px 10px rgba(0,0,0,0.08);
      border-left: 6px solid #ccc;
    }
    .live { border-left-color: #22c55e; }
    .ondeck { border-left-color: #f59e0b; }
    .upcoming { border-left-color: #60a5fa; }
    .court {
      font-weight: bold;
      margin-bottom: 8px;
    }
    .teams {
      font-size: 16px;
      font-weight: 600;
    }
    .meta {
      font-size: 13px;
      color: #666;
      margin-top: 6px;
    }
    .error {
      margin: 20px;
      padding: 12px;
      background: #fff3cd;
      border: 1px solid #f0d98c;
      border-radius: 8px;
      white-space: pre-wrap;
    }
  </style>
</head>
<body>

<header>🏸 Heart Lake Badminton Tournament</header>

<div id="errorBox"></div>

<div class="tabs">
  <div class="tab active" onclick="filterDivision('ALL', this)">All</div>
  <div class="tab" onclick="filterDivision('Boys Singles', this)">Boys Singles</div>
  <div class="tab" onclick="filterDivision('Girls Singles', this)">Girls Singles</div>
  <div class="tab" onclick="filterDivision('Boys Doubles', this)">Boys Doubles</div>
  <div class="tab" onclick="filterDivision('Girls Doubles', this)">Girls Doubles</div>
  <div class="tab" onclick="filterDivision('Mixed Doubles', this)">Mixed Doubles</div>
</div>

<div class="section">
  <h2>Now Playing</h2>
  <div id="liveMatches" class="courts"></div>
</div>

<div class="section">
  <h2>On Deck</h2>
  <div id="onDeckMatches" class="courts"></div>
</div>

<div class="section">
  <h2>Upcoming</h2>
  <div id="upcomingMatches" class="courts"></div>
</div>

<script>
const CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vQfyb8UyEF9sBz0kXRzVP3NpRx222mgJDa4OCyqZMplIMcE2U_dvwP7k98jeD8onBTvUXdHK45fP-gu/pub?gid=2075100455&single=true&output=csv";

let allData = [];
let currentDivision = "ALL";

function showError(message) {
  document.getElementById("errorBox").innerHTML = `<div class="error">${message}</div>`;
}

function clearError() {
  document.getElementById("errorBox").innerHTML = "";
}

function normalize(v) {
  return (v || "").toString().trim().toLowerCase();
}

function parseCSV(text) {
  const rows = [];
  let row = [];
  let cell = "";
  let inQuotes = false;

  for (let i = 0; i < text.length; i++) {
    const char = text[i];
    const next = text[i + 1];

    if (char === '"') {
      if (inQuotes && next === '"') {
        cell += '"';
        i++;
      } else {
        inQuotes = !inQuotes;
      }
    } else if (char === ',' && !inQuotes) {
      row.push(cell);
      cell = "";
    } else if ((char === '\n' || char === '\r') && !inQuotes) {
      if (char === '\r' && next === '\n') i++;
      row.push(cell);
      if (row.some(v => v !== "")) rows.push(row);
      row = [];
      cell = "";
    } else {
      cell += char;
    }
  }

  if (cell.length > 0 || row.length > 0) {
    row.push(cell);
    rows.push(row);
  }

  return rows;
}

async function loadData() {
  try {
    const res = await fetch(CSV_URL);
    if (!res.ok) throw new Error("Could not load published CSV.");
    const text = await res.text();

    const rows = parseCSV(text);
    const headers = rows[0].map(h => h.trim().toLowerCase());

    allData = rows.slice(1).map(r => {
      let obj = {};
      headers.forEach((h, i) => {
        obj[h] = (r[i] || "").trim();
      });
      return obj;
    });

    clearError();
    render();
  } catch (err) {
    showError("Could not load the published CSV.\n\n" + err.message);
  }
}

function renderSection(containerId, rows, className) {
  const container = document.getElementById(containerId);
  container.innerHTML = "";

  if (rows.length === 0) {
    container.innerHTML = `<div class="error">No matches found.</div>`;
    return;
  }

  rows.forEach(row => {
    const card = document.createElement("div");
    card.className = `card ${className}`;
    card.innerHTML = `
      <div class="court">Court ${row.court || "-"}</div>
      <div class="teams">${row.teams || "-"}</div>
      <div class="meta">${row.division || ""} • ${row.status || ""}</div>
    `;
    container.appendChild(card);
  });
}

function render() {
  const divisionFiltered = allData.filter(row =>
    currentDivision === "ALL" || normalize(row.division) === normalize(currentDivision)
  );

  const liveRows = divisionFiltered.filter(row => normalize(row.status) === "live");
  const onDeckRows = divisionFiltered.filter(row => normalize(row.status) === "on deck");
  const upcomingRows = divisionFiltered.filter(row => normalize(row.status) === "upcoming");

  renderSection("liveMatches", liveRows, "live");
  renderSection("onDeckMatches", onDeckRows, "ondeck");
  renderSection("upcomingMatches", upcomingRows, "upcoming");
}

function filterDivision(div, el) {
  currentDivision = div;
  document.querySelectorAll(".tab").forEach(t => t.classList.remove("active"));
  el.classList.add("active");
  render();
}

loadData();
setInterval(loadData, 10000);
</script>

</body>
</html>
